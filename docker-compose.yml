# n8n self-host (워크플로우 = 스케줄/웹훅/업로드/알림 전용 "멍청한 파이프")
# 기동: docker compose up -d   ->  http://localhost:5678
services:
  n8n:
    image: n8nio/n8n:latest
    container_name: agent-hub-n8n
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - N8N_SECURE_COOKIE=false
    volumes:
      - ./data/n8n:/home/node/.n8n
    restart: unless-stopped
